name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check for changeset
        run: |
          # Skip check for PRs that only touch non-library files
          CHANGED=$(git diff --name-only origin/main...HEAD)
          NEEDS_CHANGESET=false
          for file in $CHANGED; do
            case "$file" in
              packages/core/src/*|packages/shared/*) NEEDS_CHANGESET=true; break ;;
            esac
          done
          if [ "$NEEDS_CHANGESET" = "true" ]; then
            CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
            if [ -z "$CHANGESETS" ]; then
              echo "::warning::Cette PR modifie packages/core/src/ ou packages/shared/ mais ne contient pas de changeset."
              echo "::warning::Lancez 'npx changeset' pour en creer un."
            else
              echo "Changeset trouve."
            fi
          else
            echo "Pas de modification de la bibliotheque, changeset non requis."
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build library
        run: npm run build

      - name: Build all apps
        run: npm run build:apps

      - name: Build app-dist
        run: node scripts/build-app.js

  sca:
    name: Security — SCA & config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit — mcp-server
        working-directory: mcp-server
        run: npm audit --audit-level=high

      - name: Trivy — filesystem (vulnerabilities)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Trivy — config (Dockerfiles)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

  sca-advisory:
    # Non-blocking advisory channel — see ADR-004 (Politique de sévérité SCA).
    # Gate reste HIGH/CRITICAL (job `sca` above). Ce job remonte les MODERATE
    # en step summary sans casser la CI. Remédiation asynchrone via Dependabot
    # (labels: [security] configurés dans .github/dependabot.yml).
    name: Security — SCA advisory (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (root, moderate+)
        id: audit_root
        continue-on-error: true
        run: |
          echo "### 📋 npm audit — root (moderate+)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --omit=optional 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: npm audit (mcp-server, moderate+)
        id: audit_mcp
        continue-on-error: true
        working-directory: mcp-server
        run: |
          echo "### 📋 npm audit — mcp-server (moderate+)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Trivy — filesystem (MEDIUM+)
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: table
          output: trivy-advisory.txt
          trivyignores: .trivyignore

      - name: Append Trivy output to summary
        if: always()
        run: |
          echo "### 🛡️ Trivy fs — MEDIUM+ (non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-advisory.txt 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  secrets:
    name: Security — Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Security — SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/xss \
            --config=p/security-audit \
            --exclude-rule=html.security.audit.missing-integrity.missing-integrity \
            --severity=ERROR \
            --severity=WARNING \
            --metrics=off \
            --sarif --output=semgrep.sarif \
            --error \
            packages/core/src apps server/src scripts

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
