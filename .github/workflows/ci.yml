name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check for changeset
        run: |
          # Skip check for PRs that only touch non-library files
          CHANGED=$(git diff --name-only origin/main...HEAD)
          NEEDS_CHANGESET=false
          for file in $CHANGED; do
            case "$file" in
              packages/core/src/*|packages/shared/*) NEEDS_CHANGESET=true; break ;;
            esac
          done
          if [ "$NEEDS_CHANGESET" = "true" ]; then
            CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
            if [ -z "$CHANGESETS" ]; then
              echo "::warning::Cette PR modifie packages/core/src/ ou packages/shared/ mais ne contient pas de changeset."
              echo "::warning::Lancez 'npx changeset' pour en creer un."
            else
              echo "Changeset trouve."
            fi
          else
            echo "Pas de modification de la bibliotheque, changeset non requis."
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build library
        run: npm run build

      - name: Build all apps
        run: npm run build:apps

      - name: Build app-dist
        run: node scripts/build-app.js
