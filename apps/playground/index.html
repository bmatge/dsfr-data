<!DOCTYPE html>
<html lang="fr" data-fr-theme>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dsfr-data — Playground</title>
  <style>@view-transition{navigation:auto}app-header:not(:defined){display:block;min-height:56px}app-footer:not(:defined){display:block;min-height:48px}</style>

  <!-- DSFR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/utility/utility.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">

  <!-- DSFR Chart -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr-chart@2.0.4/dist/DSFRChart/DSFRChart.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr-chart@2.0.4/dist/DSFRChart/DSFRChart.js"></script>

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Composants dsfr-data -->
  <script type="module" src="../../packages/core/dist/dsfr-data.esm.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles/playground.css">
</head>
<body>
  <!-- Header -->
  <app-header current-page="playground" base-path="../.."></app-header>

  <div class="example-selector">
    <label for="example-select">Charger un exemple :</label>
    <select id="example-select" class="fr-select fr-select--sm" style="width: auto; display: inline-block;">
      <optgroup label="Mode direct (dsfr-data-source)">
        <option value="direct-bar">Barres — Fiscalite locale</option>
        <option value="direct-bar-databox">Barres + DataBox complete — Fiscalite locale</option>
        <option value="direct-line-databox">Ligne + DataBox — Fiscalite locale</option>
        <option value="direct-kpi">KPI — Industrie du futur</option>
        <option value="direct-datalist">Tableau — Maires de France (server-side)</option>
      </optgroup>
      <optgroup label="Pagination serveur">
        <option value="server-paginate-datalist">Tableau — Maires pagination serveur</option>
        <option value="server-paginate-display">Cartes — Maires pagination serveur</option>
        <option value="paginate-kpi-global">Pagination + KPI — Industrie du futur</option>
      </optgroup>
      <optgroup label="Avec requete (dsfr-data-query)">
        <option value="query-bar">Barres — Beneficiaires par region</option>
        <option value="query-pie">Camembert — Investissement par region</option>
        <option value="query-map">Carte — Taux TFB par departement</option>
      </optgroup>
      <optgroup label="Avec normalisation (dsfr-data-normalize)">
        <option value="normalize-bar">Barres — LOVAC vacants par dept</option>
        <option value="normalize-pie">Camembert — LOVAC vacants >2 ans</option>
        <option value="normalize-datalist">Tableau — LOVAC donnees nettoyees</option>
      </optgroup>
      <optgroup label="Affichage dynamique (dsfr-data-display)">
        <option value="direct-display">Cartes — Industrie du futur (server-side)</option>
        <option value="query-display">Cartes — Communes de l'Ain (server-side)</option>
        <option value="normalize-display">Tuiles — LOVAC logements vacants</option>
      </optgroup>
      <optgroup label="Avec recherche (dsfr-data-search)">
        <option value="search-datalist">Tableau — Rappels produits (recherche serveur)</option>
        <option value="search-display">Cartes — Industrie (recherche serveur)</option>
        <option value="search-kpi-chart">KPI + Barres — Recherche dynamique</option>
      </optgroup>
      <optgroup label="Avec facettes (dsfr-data-facets)">
        <option value="facets-datalist">Tableau — Industrie avec facettes</option>
        <option value="facets-bar">Barres — Industrie filtree par region</option>
        <option value="facets-map">Carte + KPI — Fiscalite par region</option>
      </optgroup>
      <optgroup label="Jointure multi-sources (dsfr-data-join)">
        <option value="join-basic">Population vs Budget — 2 series (left join)</option>
        <option value="join-query">Recettes vs Depenses — inner join + tri</option>
      </optgroup>
      <optgroup label="Server-side (recherche + tri serveur)">
        <option value="server-side-ods">Recherche serveur — Rappels (ODS)</option>
        <option value="server-side-tabular-tri">Tri serveur — Communes (Tabular)</option>
        <option value="server-facets-display">Facettes serveur + normalize — Industrie (ODS)</option>
      </optgroup>
      <optgroup label="Carte du monde (dsfr-data-world-map)">
        <option value="direct-worldmap">Carte — PIB par pays</option>
      </optgroup>
      <optgroup label="Carte interactive (dsfr-data-map)">
        <option value="map-markers-cluster">Carte — 5000 CT avec clustering + panneau</option>
        <option value="map-circles-proportional">Carte — Cercles proportionnels + modale</option>
        <option value="map-multi-layer">Carte — Multi-couches heatmap + marqueurs</option>
      </optgroup>
    </select>
    <a href="../../guide/guide.html#exemples" class="fr-link fr-link--sm fr-ml-2w" style="white-space: nowrap;">
      <i class="ri-book-open-line fr-mr-1v" aria-hidden="true"></i>Guide et exemples
    </a>
  </div>

  <app-layout-builder left-ratio="50">
    <div slot="left" class="playground-editor">
      <div class="editor-toolbar">
        <button id="run-btn" class="fr-btn fr-btn--sm fr-btn--icon-left fr-icon-play-line">
          Executer
        </button>
        <button id="reset-btn" class="fr-btn fr-btn--sm fr-btn--secondary fr-btn--icon-left fr-icon-refresh-line">
          Reinitialiser
        </button>
        <span style="flex: 1;"></span>
        <button id="deps-btn" class="fr-btn fr-btn--sm fr-btn--secondary" title="Ajouter les CSS/JS necessaires pour integrer le code dans une page externe">
          <i class="ri-code-s-slash-line" aria-hidden="true"></i>
          + Deps
        </button>
        <button id="copy-btn" class="fr-btn fr-btn--sm fr-btn--secondary">
          <i class="ri-file-copy-line" aria-hidden="true"></i>
          Copier
        </button>
        <button id="save-btn" class="fr-btn fr-btn--sm fr-btn--secondary">
          <i class="ri-star-line" aria-hidden="true"></i>
          Favoris
        </button>
        <button id="pipeline-btn" class="fr-btn fr-btn--sm fr-btn--secondary" title="Visualiser le pipeline de composants dans le Pipeline Helper">
          <i class="ri-flow-chart" aria-hidden="true"></i>
          Pipeline
        </button>
      </div>
      <textarea id="code-editor"></textarea>
    </div>
    <div slot="right" class="playground-preview">
      <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts allow-same-origin allow-downloads allow-popups" title="Apercu du code"></iframe>
    </div>
  </app-layout-builder>

  <!-- Footer -->
  <app-footer base-path="../.."></app-footer>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.module.min.js"></script>
  <!-- App entry point -->
  <script type="module" src="src/main.ts"></script>
</body>
</html>
