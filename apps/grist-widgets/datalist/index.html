<!DOCTYPE html>
<html lang="fr" data-fr-theme>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dsfr-data — Tableau DSFR (Grist)</title>

  <!-- DSFR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/dsfr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.14.4/dist/utility/utility.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">

  <!-- dsfr-data (UMD : enregistre les custom elements + expose DsfrData global) -->
  <script src="../lib/dsfr-data.umd.js"></script>

  <!-- Grist Plugin API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Widget entry point -->
  <script type="module" src="../src/datalist.ts"></script>
</head>
<body>
  <div class="grist-widget" id="widget-root">
    <div class="grist-empty" id="empty-state">
      <i class="ri-table-line"></i>
      <p>Les donnees de la table Grist seront affichees ici</p>
    </div>
    <div class="grist-toolbar" id="datalist-toolbar" style="display: none;">
      <button class="fr-btn fr-btn--sm fr-btn--tertiary-no-outline" id="btn-toggle-code" type="button">
        <span class="ri-code-s-slash-line" aria-hidden="true"></span>
        Voir le code
      </button>
    </div>
    <div class="grist-widget-content" id="datalist-container" style="display: none;">
      <dsfr-data-list
        source="grist"
        recherche
        pagination="20"
        export="csv">
      </dsfr-data-list>
    </div>
    <div class="grist-code-panel" id="code-panel" style="display: none;">
      <div class="grist-code-header">
        <div class="grist-code-tabs">
          <button class="grist-code-tab active" id="tab-fixed" type="button">Donnees fixes</button>
          <button class="grist-code-tab" id="tab-dynamic" type="button">Donnees dynamiques</button>
        </div>
        <button class="fr-btn fr-btn--sm fr-btn--tertiary-no-outline" id="btn-copy-code" type="button">
          <span class="ri-clipboard-line" aria-hidden="true"></span>
          Copier
        </button>
      </div>
      <pre class="grist-code-block"><code id="code-content"></code></pre>
    </div>
    <div class="grist-options-panel" id="options-panel"></div>
  </div>
</body>
</html>
